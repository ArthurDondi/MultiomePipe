name: scvi
# GPU environment for scVI / scANVI batch correction (BatchCorrection rule when
# QC_RNA.BatchCorrection.method is "scvi" or "scanvi"). Includes the scanpy stack
# so the same script can also do neighbours / UMAP / Leiden / plotting.
#
# Pinned for this cluster's GPU nodes:
#   GPU    : NVIDIA L4 (Ada Lovelace, compute capability sm_89, 24 GB)
#   Driver : 535.216.01  -> supports up to CUDA 12.2
# PyTorch is installed from the official CUDA 12.1 wheels (cu121): they run on
# any >=12.x driver (so fine on 12.2), support sm_89, and bundle their own CUDA
# runtime, so the env solves/installs without needing a GPU on the build node.
# If you move to newer GPUs, bump the cu121 index + torch version accordingly.
channels:
  - conda-forge
  - bioconda
dependencies:
  - python=3.11
  - pip

  # scanpy stack (HVG selection, neighbours, UMAP, Leiden, plotting)
  - scanpy=1.10.4
  - anndata=0.11.3
  - numpy<2                    # torch 2.3 wheels are built against numpy 1.x
  - pandas=2.2.*
  - scipy=1.13.*
  - scikit-learn=1.5.*
  - scikit-misc=0.5.*          # required for seurat_v3 HVG (loess); conda-forge
                               # has no 0.3.x (jumps 0.1.4 -> 0.5.x). 0.5.2 needs
                               # numpy>=1.26.4 but has no upper pin and its wheels
                               # are built numpy-2-ABI (run fine on numpy 1.x), so
                               # it coexists with the numpy<2 torch constraint.
  - leidenalg=0.10.2
  - python-igraph=0.11.*
  - matplotlib-base=3.9.*
  - seaborn=0.13.*
  - h5py=3.11.*
  - pyyaml
  - pooch                      # scvi-tools lists pooch as an *optional* extra,
                               # but `import scvi` pulls in scvi.data ->
                               # _built_in_data/{_loom,_smfish}.py which do a
                               # top-level `import pooch`, so it's needed just to
                               # import scvi at all (not only for built-in data).

  - pip:
      # CUDA 12.1 PyTorch wheels (compatible with driver 535 / CUDA 12.2, sm_89).
      - --extra-index-url https://download.pytorch.org/whl/cu121
      - torch==2.3.1
      - scvi-tools==1.2.2
