General:
  genome: "hg38"
  celltype_key: "cell_type"
  sample_key: "sample"
  donor_key: "donor"
  dataset_key: "dataset"

QC_RNA:
  raw_data: True

  # Background correction method: "soupx" (default, DropletQC -> SoupX) or "cellbender"
  background_correction: soupx

  CellRangerMkref:
    genome: "GRCh38_GFP"
    fasta: "/nobackup/lab_taschner-mandl/arthurdondi/resources/references/hg38/BMO/GRCh38.primary_assembly.genome.plusGFP.fa"
    genes: "/nobackup/lab_taschner-mandl/arthurdondi/resources/references/hg38/BMO/gencode.v50.basic.annotation.plusGFP.gtf"
    output_dir: "/nobackup/lab_taschner-mandl/arthurdondi/resources/references/hg38/BMO/cellranger_ref"

  CellRangerCount:
    transcriptome: "/nobackup/lab_taschner-mandl/arthurdondi/resources/references/hg38/BMO/cellranger_ref/GRCh38_GFP"
    localcores: 8
    localmem: 64
    create_bam: false

  CellbenderRemoveBackgroundRNA:
    cuda: '--cuda'
    epochs: 150
    expected-cells: 20000
    checkpoint_mins: 30
    projected_ambient_count_threshold: 0.05
    empty_drop_training_fraction: 0.05

  DropletQC:
    assay_type: scrna          # all three datasets are whole-cell scRNA (3' v3)
    seurat_resolution: 0.5
    min_umi_for_nf: 100

  SoupX:
    contaminant_genes:
      - PHOX2B
      - CHGA
      - TH
    resolution: 1.0

  RawFilteringRNA:
    min_genes: 200
    min_cells: 5
    n_mads: 5
    doublet_threshold: .25
    n_top_genes: 8000

  BatchCorrection:
    markers: /nobackup/lab_taschner-mandl/arthurdondi/resources/references/hg38/BMO/marker_genes.json

    # Batch correction method: "harmony" (CPU, default) | "scvi" | "scanvi".
    # scvi/scanvi run on the SLURM `gpu` queue using workflow/envs/scvi.yaml.
    # scanvi ALWAYS trains scVI first, then fine-tunes it with the labels below.
    method: scanvi

    # Wall-clock limit in MINUTES for the BatchCorrection job. Used for the
    # gpu queue when method is scvi/scanvi (default 240 = 4h).
    runtime: 240

    # scVI hyperparameters (also used as the base model for scANVI).
    scvi:
      n_hvg: 5000          # seurat_v3 HVGs (on raw counts) used to train scVI
      n_latent: 30         # latent dimensions -> X_scVI / X_scANVI embedding
      max_epochs: null     # null -> scvi-tools auto heuristic

    # scANVI settings (ignored when method != scanvi).
    scanvi:
      max_epochs: 20
      unlabeled_category: "Unknown"
      # Per-dataset label sources. Cells whose `dataset` matches get their
      # label from `label_column` of `reference_h5ad`, matched by cell barcode.
      # Datasets not listed (and any unmatched cell) become "Unknown" and are
      # treated by scANVI as unlabeled.
      label_sources:
        - dataset: "Frenz"
          reference_h5ad: /nobackup/lab_taschner-mandl/arthurdondi/data/frenz-wiessner2024/h5ad/5aa415c8-47e1-41f3-9a83-663b4e4c36b1.h5ad
          label_column: "author_cell_type"
        - dataset: "Fetahu"
          reference_h5ad: /nobackup/lab_taschner-mandl/arthurdondi/data/fetahu2023.scRNA/Published/metadata_celltype.h5ad # derived from metadata.rds
          label_column: "cellont_name"

  PlottingAnnotations:
    doublets: "Doublets 'Low quality'"
    leiden_res: "leiden_res_1.00"

  LabelTransfer:
    reference_h5ad: "/nobackup/lab_taschner-mandl/arthurdondi/data/frenz-wiessner2024/h5ad/5aa415c8-47e1-41f3-9a83-663b4e4c36b1.h5ad"
    reference_columns:
      - "author_cell_type_coarse_grained"
      - "author_cell_type"
    n_neighbors: 15

  TrajectoryAnalysis:
    diffusion_component: 1
    root_ctype: "Hematopoietic precursor cell"
    celltype_mask: "'Neuroblastoma cell' 'Undefined' 'Other' 'Erythroid lineage cell' 'T cell' 'NK cell'  'Myeloid cell' 'Plasmacytoid dendritic cell'"
    n_genes: 20
    clustering_distance: 1
    cat_order: "'Hematopoietic precursor cell' 'Erythroid lineage cell' 'T cell' 'NK cell'  'Myeloid cell' 'Plasmacytoid dendritic cell' 'B cell'"
    branching: 0

### QC ATAC
QC_ATAC:
  ExportPseudobulk:
    variable: "VSN_cell_type"
    sample_id_col: "VSN_sample_id"
    n_cpu: 1
    normalize_bigwig: ""
    split_pattern: "-"
    chromsizes: null

  MACS2CallPeaks:
    format: "BEDPE"
    gsize: "hs"
    qvalue: 0.05
    shift: 73
    extsize: 146
    keep_dup: "all"
    call_summits: "--call-summits"
    nolambda: "--nolambda"

  DownloadTSS:
    tss_dataset: "hsapiens_gene_ensembl"
    tss_host: "http://www.ensembl.org"

  ComputeQC:
    threads: 1
    min_fragments_per_cb: 100
    dont-collapse_duplicates: ""
    tss_flank_window: 2000
    tss_smoothing_rolling_window: 10
    tss_minimum_signal_window: 100
    tss_window: 50
    tss_min_norm: 0.2

  ApplyQC:
    unique_fragments_threshold: null
    tss_enrichment_threshold: null
    frip_threshold: 0

  CreateATACCountMatrix:
    threads: 1
    min_fragments_per_region: 10
    min_cells_per_region: 10

  RunLDAModels:
    n_cpus: 1
    n_topics: "2 5 10 15 20 25 30 35 40 45 50"
    n_iter: 500
    random_state: 0
    alpha: 50
    alpha_by_topic: '--alpha_by_topic'
    eta: 0.1
    eta_by_topic: '--eta_by_topic'
