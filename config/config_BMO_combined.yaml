# MultiomePipe config yaml file
# Combined BMO+NB cell lines (BMO) + Frenz-Wiessner 2024 (Frenz) + Fetahu 2023 (Fetahu)
# All three datasets quantified against the shared hg38+GFP reference and integrated
# jointly (batch key = dataset + donor + sample). Batch correction method is
# configurable under QC_RNA.BatchCorrection.method (harmony | scvi | scanvi).

# Change those values to yours
User:
  input_dir: /nobackup/lab_taschner-mandl/arthurdondi/data            # fallback root; per-sample fastq_dir below is authoritative
  output_dir: /nobackup/lab_taschner-mandl/arthurdondi/projects/BMO
  cellranger: /nobackup/lab_taschner-mandl/arthurdondi/src/cellranger-10.0.0/cellranger

# Change any of those to True if you want to run it, else False
Run:
  QC_RNA: True
  QC_ATAC: False
  TRAJ: False
  LABEL_TRANSFER: True

