# Config for the SNP-array vs inferCNV comparison pipeline
# (inferCNV/snp_array/Snakefile). Pass it with --configfile.
#
# Prerequisite: inferCNV has already been run in subclusters mode, so each
# <infercnv_results_dir>/<sample>/ folder holds a *pred_cnv_regions.dat and an
# *observation_groupings.txt. Then just fill the per-sample array BED paths below.

snp_array:

  # ---- inferCNV outputs (input) -------------------------------------------
  # Root that holds one sub-folder per sample (matches OUTPUT_DIR in run_infercnv.R).
  infercnv_results_dir: /nobackup/lab_taschner-mandl/arthurdondi/projects/BMO/QC/RNA/Merged/inferCNV/results

  # Glob (inside results/<sample>/) for the HMM regions + the groupings file. This
  # matches both the pre-filter (17_HMM_pred...) and the Bayes-filtered
  # (...Pnorm_0.5...) subclusters predictions; the Pnorm one is preferred when both
  # are present.
  pred_glob: "*subclusters*pred_cnv_regions.dat"
  groupings_glob: "*observation_groupings.txt"

  # ---- comparison outputs -------------------------------------------------
  output_dir: /nobackup/lab_taschner-mandl/arthurdondi/projects/BMO/QC/RNA/Merged/inferCNV/snp_array_comparison

  # ---- liftover -----------------------------------------------------------
  # Local UCSC hg19->hg38 chain for offline clusters. Leave empty ("") to let
  # pyliftover download it (needs internet on the compute node).
  #   wget http://hgdownload.soe.ucsc.edu/goldenPath/hg19/liftOver/hg19ToHg38.over.chain.gz
  chain: /nobackup/lab_taschner-mandl/arthurdondi/resources/liftover/hg19ToHg38.over.chain.gz
  max_nudge: 200000        # rescue an unmappable boundary by nudging inward up to this many bp

  # ---- comparison parameters ----------------------------------------------
  hmm_i: null              # inferCNV HMM model: null = autodetect from the pred filename
                           # (HMMi3 / HMMi6); the filename always wins over a set value
  type_col: 4              # 1-based CATEGORY column giving event direction:
                           # gain / wc_gain / amplification -> gain, loss / wc_loss -> loss,
                           # anything else -> segment ignored (wc = whole chromosome)
  cn_col: 13               # 1-based copy-number column, recorded in the per-event table
                           # only (blank if non-numeric) -- does NOT affect direction
  min_overlap: 0.5         # min same-direction overlap of a reference event to count it matched

  # ---- samples -> SNP-array CNV BED ----------------------------------------
  # One entry per sample. A value is either a plain hg19 BED path, OR a mapping that
  # overrides type_col / cn_col for that one sample (rarely needed):
  #     BMO-STANB8:
  #       bed: /path/STANB8.hg19.bed
  #       type_col: 4        # set if the gain/loss category is in a different column
  #       cn_col: 12         # set if the copy number is in a different column
  # Samples sharing a cell line point at the SAME BED (e.g. IMR DOX/noDOX). Delete
  # any line you have no array for. (BMOalone = organoid, no cancer line -> no array.)
  samples:
    BMO-SKNBE2c:   /nobackup/lab_taschner-mandl/arthurdondi/data/cell_lines/snp_array/SKNBE2c.hg19.bed
    BMO-SKNSH:     /nobackup/lab_taschner-mandl/arthurdondi/data/cell_lines/snp_array/SKNSH.hg19.bed
    BMO-STANB12:
      bed: /nobackup/lab_taschner-mandl/arthurdondi/data/cell_lines/snp_array/STANB12.hg19.bed
      cn_col: 12           # this file records copy number in col 12 (recorded value only)
    BMO-STANB8:    /nobackup/lab_taschner-mandl/arthurdondi/data/cell_lines/snp_array/STANB8.hg19.bed
    #BMO-IMR-DOX:   /nobackup/lab_taschner-mandl/arthurdondi/data/cell_lines/snp_array/IMR.hg19.bed
    #BMO-IMR-noDOX: /nobackup/lab_taschner-mandl/arthurdondi/data/cell_lines/snp_array/IMR.hg19.bed
